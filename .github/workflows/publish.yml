name: Publish to npm

on:
  release:
    types: [published]
  # Manual trigger for validating the publish path (e.g. re-running against an
  # already-published version: OIDC auth succeeds, npm then rejects the duplicate).
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for npm Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      # NOTE: do NOT set registry-url / NODE_AUTH_TOKEN here. setup-node writes an
      # .npmrc that expects a token and that interferes with OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Trusted publishing requires npm CLI >= 11.5.1 (newer than what ships with Node).
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Auth is handled automatically via OIDC because a trusted publisher is
      # configured for this package on npmjs.com (no NPM_TOKEN secret needed).
      - name: Publish to npm
        run: npm publish --provenance --access public
